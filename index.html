<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="style.css">
    <script src="https://unpkg.com/feather-icons"></script>
    <title>Document</title>
</head>
<body>
    
    <div class="pomodoro">
        <div class="timer">
            <span id="minutes">00</span>:<span id="seconds">00</span><br>
        </div>
        <div class="buttons">
            <button onclick="startCounter()"><i data-feather="play"></i></button>
            <button onclick="pauseCounter()"><i data-feather="pause"></i></button>
            <button onclick="resetCounter()"><i data-feather="rotate-ccw"></i></button>
        </div>
    </div>
    
    

    <script>

        let minutes, seconds, counterInterval = undefined;

        const minutesEl = document.getElementById('minutes');
        const secondsEl = document.getElementById('seconds');

        resetCounter();

        function updateCounterEl() {
            minutesEl.innerHTML = minutes < 10 ? `0${minutes}` : minutes;
            secondsEl.innerHTML = seconds < 10 ? `0${seconds}` : seconds;
        }

        function startCounter() {
            if(counterInterval) return;

            counterInterval = setInterval( () => {
                const timeOver = !seconds && !minutes;
                const secondsOver = !seconds;

                if (timeOver) return destroyInterval();

                if (secondsOver) {
                    seconds = 59;
                    --minutes;
                    updateCounterEl();
                    return;
                }      

                --seconds;
                updateCounterEl();

            }, 1000);
        }

        function pauseCounter() {
            destroyInterval();
        }

        function destroyInterval() {
            clearInterval(counterInterval);
            counterInterval = undefined;
        }

        function resetCounter() {
            destroyInterval();

            minutes = 25;
            seconds = 00;

            updateCounterEl();
        }



        feather.replace()
    </script>
</body>
</html>
